<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTV - Upload Direto</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #ffffff; }
        .container { display: grid; grid-template-columns: 1fr 2fr; height: 100vh; gap: 0; }

        .control-panel { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-right: 2px solid #334155; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .panel-scrollable { padding: 12px; flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; }
        .panel-footer { padding: 10px 12px; background: #0a1628; border-top: 2px solid #334155; flex-shrink: 0; }
        .panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #334155; flex-shrink: 0; }
        .panel-header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .section { margin-bottom: 10px; flex-shrink: 0; }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 6px; display: block; }
        .form-group { margin-bottom: 6px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 3px; color: #cbd5e1; }
        input[type="text"], input[type="file"], input[type="password"], select { width: 100%; padding: 6px 10px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #ffffff; font-size: 12px; transition: all 0.2s; }
        input[type="file"] { cursor: pointer; }
        input[type="file"]::file-selector-button { background: #3b82f6; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: 600; margin-right: 6px; font-size: 12px; }
        input[type="file"]::file-selector-button:hover { background: #2563eb; }
        input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        button { padding: 7px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; width: 100%; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 12px rgba(59,130,246,0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #334155; color: #e2e8f0; width: 100%; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #ef4444; color: white; padding: 4px 10px; font-size: 11px; width: auto; }
        .btn-danger:hover { background: #dc2626; }

        .progress-container { margin-bottom: 6px; display: none; }
        .progress-container.active { display: block; }
        .progress-bar { width: 100%; height: 4px; background: #334155; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width 0.3s ease; }
        .progress-text { font-size: 11px; color: #64748b; margin-top: 3px; }
        .file-name { font-size: 11px; color: #64748b; margin-top: 4px; padding: 4px 8px; background: rgba(255,255,255,0.03); border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-msg { font-size: 11px; padding: 5px 10px; border-radius: 6px; margin-bottom: 6px; display: none; flex-shrink: 0; }
        .status-msg.show { display: block; }
        .s-ok { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
        .s-err { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .s-warn { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }

        .queue-list { display: flex; flex-direction: column; gap: 5px; flex: 1; overflow-y: auto; min-height: 0; }
        .empty-queue { text-align: center; padding: 16px; color: #475569; font-size: 12px; }
        .queue-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: rgba(255,255,255,0.04); border: 1px solid #334155; border-radius: 6px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .queue-item:hover { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.3); }
        .queue-item.active { background: rgba(59,130,246,0.12); border-color: #3b82f6; }
        .queue-item-name { font-size: 12px; font-weight: 600; color: #e2e8f0; margin-bottom: 1px; }
        .queue-item-type { font-size: 10px; color: #64748b; }

        .display-area { background: #000; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .display-hud { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); transition: opacity 0.4s ease; }
        .display-area.fs-idle .display-hud, .display-area.fs-idle .display-nav { opacity: 0; pointer-events: none; }
        .display-area.fs-idle { cursor: none; }
        .hud-info strong { font-size: 14px; font-weight: 700; display: block; }
        .hud-info span { font-size: 12px; color: #94a3b8; }
        .hud-status { font-size: 12px; color: #64748b; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 4px; }
        .display-content { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: opacity 0.5s ease; }
        .display-content img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .display-content video { max-width: 100%; max-height: 100%; }
        .display-content iframe { width: 100%; height: 100%; border: none; }
        .display-placeholder { text-align: center; color: #334155; }
        .display-placeholder h2 { font-size: 64px; margin-bottom: 16px; }
        .display-placeholder p { font-size: 18px; }
        .display-nav { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px 20px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); transition: opacity 0.4s ease; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; width: auto; }
        .nav-btn:hover { background: rgba(59,130,246,0.3); border-color: #3b82f6; }
        .btn-loop { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 4px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; text-align: center; line-height: 1.3; min-height: 44px; }
        .btn-loop:hover { background: #334155; color: #e2e8f0; border-color: #475569; }
        .btn-loop.active { background: rgba(59,130,246,0.2); border-color: #3b82f6; color: #60a5fa; box-shadow: 0 0 0 1px #3b82f6 inset; }
        .btn-loop-active { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.4); color: #4ade80; padding: 8px 4px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; text-align: center; line-height: 1.3; min-height: 44px; }
        .btn-loop-active.off { background: #1e293b; border-color: #334155; color: #64748b; }
        .loop-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; font-weight: 700; }
        .loop-badge.playlist { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .loop-badge.single { background: rgba(139,92,246,0.2); color: #a78bfa; }

    </style>
</head>
<body>
<div class="container">

    <div class="control-panel">
        <div class="panel-scrollable">
        <div class="panel-header"><h1>📺 StreamTV</h1></div>

        <div class="status-msg" id="statusMsg"></div>

        <!-- UPLOAD -->
        <div class="section">
            <span class="section-title">Fazer Upload</span>
            <div class="form-group">
                <label>Nome/Título</label>
                <input type="text" id="mediaName" placeholder="Ex: Apresentação Q1 2024">
            </div>
            <div class="form-group">
                <label>Arquivo</label>
                <input type="file" id="mediaFile" accept="image/*,video/*,.pdf" onchange="updateFileName()">
                <div class="file-name" id="fileName">Nenhum arquivo selecionado</div>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">Enviando... 0%</div>
            </div>
            <button class="btn-primary" id="uploadBtn" onclick="uploadMedia()">⬆️ Fazer Upload</button>
        </div>

        <!-- FILA -->
        <div class="section" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;">
            <span class="section-title">Fila (<span id="queueCount">0</span>)</span>
            <div class="queue-list" id="queueList">
                <div class="empty-queue">Nenhuma mídia na fila</div>
            </div>
        </div>
        </div><!-- end panel-scrollable -->

        <!-- RODAPÉ FIXO: LOOP + CONTROLES -->
        <div class="panel-footer">
            <!-- CONTROLES DE LOOP -->
            <div style="margin-bottom:8px;">
                <span class="section-title" style="margin-bottom:6px;">🎬 Modo de Reprodução</span>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;">
                    <button class="btn-loop" id="btnLoopPlaylist" onclick="setLoopMode('playlist')" title="Loop pela playlist">🔁<br><span style="font-size:9px;">Playlist</span></button>
                    <button class="btn-loop" id="btnLoopSingle" onclick="setLoopMode('single')" title="Repetir vídeo único">🔂<br><span style="font-size:9px;">Único</span></button>
                    <button class="btn-loop" id="btnLoopOff" onclick="setLoopMode('off')" title="Sem loop">⏹️<br><span style="font-size:9px;">Sem Loop</span></button>
                    <button class="btn-loop-active" id="btnAutoplay" onclick="toggleAutoplay()" title="Auto avanço">▶️<br><span style="font-size:9px;" id="autoplayLabel">Auto: ON</span></button>
                </div>
            </div>
            <!-- CONTROLES GERAIS -->
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;">
                <button class="btn-secondary" onclick="loadFromSupabase()" style="font-size:10px;padding:6px 4px;">🔄 Sync</button>
                <button class="btn-secondary" onclick="clearLocal()" style="font-size:10px;padding:6px 4px;">🗑️ Limpar</button>
                <button class="btn-secondary" onclick="toggleFullscreen()" style="font-size:10px;padding:6px 4px;">🖥️ Full</button>
            </div>
        </div>
    </div>

    <!-- DISPLAY -->
    <div class="display-area" id="displayArea">
        <div class="display-hud">
            <div class="hud-info">
                <strong id="hudTitle">StreamTV</strong>
                <span id="hudPosition">Nenhuma mídia</span>
            </div>
            <div class="hud-status" id="hudStatus">Aguardando mídia...</div>
        </div>
        <div class="display-content" id="displayContent">
            <div class="display-placeholder"><h2>📺</h2><p>Nenhuma mídia para exibir</p></div>
        </div>
        <div class="display-nav">
            <button class="nav-btn" onclick="navigate(-1)">◀ Anterior</button>
            <span class="nav-counter" id="navCounter">—</span>
            <button class="nav-btn" onclick="navigate(1)">Próxima ▶</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// =====================================================
//  STREAMTV — Supabase Storage
//  Bucket público "streamtv" — sem login, sem token, sem
//  limite baixo de tamanho (troca do GitHub Contents API,
//  que rejeitava vídeo com erro 422 "arquivo muito grande").
//  A anon key abaixo é pública por design: protegida pelas
//  policies do bucket, não por estar escondida.
// =====================================================
const SUPA_URL = 'https://prquggwhjcvenzuziaox.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBycXVnZ3doamN2ZW56dXppYW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTUzMDUsImV4cCI6MjA5Mzc5MTMwNX0.vjbVhGIUowS6AGE1Uf5uDutCMI193mhgra3GSwlqMec';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);
const BUCKET = 'streamtv';

const FOLDER = 'midia'; // pasta dentro do bucket
let queue = [];
let currentIndex = 0;
let isUploading = false;
let loopMode = 'playlist'; // 'playlist' | 'single' | 'off'
let autoplay = true;

function setLoopMode(mode) {
    loopMode = mode;
    document.getElementById('btnLoopPlaylist').classList.toggle('active', mode === 'playlist');
    document.getElementById('btnLoopSingle').classList.toggle('active', mode === 'single');
    document.getElementById('btnLoopOff').classList.toggle('active', mode === 'off');
    // Re-render display to apply new loop setting to current video
    updateDisplay();
}

function toggleAutoplay() {
    autoplay = !autoplay;
    const btn = document.getElementById('btnAutoplay');
    document.getElementById('autoplayLabel').textContent = autoplay ? 'Auto: ON' : 'Auto: OFF';
    btn.className = autoplay ? 'btn-loop-active' : 'btn-loop-active off';
}

// ── HELPERS ──
const v   = id => document.getElementById(id).value.trim();
const set = (id, val) => { document.getElementById(id).value = val; };
const ls  = (k, v) => localStorage.setItem(k, v);
const lg  = k => localStorage.getItem(k) || '';

function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg show s-' + type;
    if (type === 'ok') setTimeout(() => el.classList.remove('show'), 4000);
}

function updateFileName() {
    const file = document.getElementById('mediaFile').files[0];
    document.getElementById('fileName').textContent = file
        ? `✓ ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`
        : 'Nenhum arquivo selecionado';
}

function updateProgress(pct) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Enviando... ${Math.round(pct)}%`;
}

// ── UPLOAD PARA O SUPABASE STORAGE ──
async function uploadMedia() {
    const name = v('mediaName');
    const file = document.getElementById('mediaFile').files[0];

    if (!name || !file) { alert('Preencha o nome e selecione um arquivo'); return; }
    if (isUploading) return;

    isUploading = true;
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('progressContainer').classList.add('active');
    updateProgress(10);

    try {
        const ext    = file.name.split('.').pop().toLowerCase();
        const safe   = name.replace(/[^a-zA-Z0-9_\-]/g, '_');
        const stPath = `${FOLDER}/${Date.now()}_${safe}.${ext}`;

        updateProgress(30);
        const { error: upErr } = await sb.storage.from(BUCKET).upload(stPath, file, {
            cacheControl: '3600',
            upsert: false,
            contentType: file.type || undefined
        });
        if (upErr) throw new Error(upErr.message);
        updateProgress(90);

        const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(stPath);
        const type = ['mp4','webm','mov','avi','mkv'].includes(ext) ? 'video'
                   : ext === 'pdf' ? 'document' : 'image';

        queue.push({
            id: stPath,
            name,
            type,
            url: pub.publicUrl,
            stPath,
            fileName: file.name,
            fileSize: file.size
        });
        updateProgress(100);

        saveLocal();
        renderQueue();
        updateDisplay();
        showStatus(`✅ "${name}" salvo!`, 'ok');
        set('mediaName', '');
        document.getElementById('mediaFile').value = '';
        document.getElementById('fileName').textContent = 'Nenhum arquivo selecionado';

    } catch (err) {
        showStatus(`❌ ${err.message}`, 'err');
        alert('Erro ao enviar: ' + err.message);
    } finally {
        isUploading = false;
        document.getElementById('uploadBtn').disabled = false;
        setTimeout(() => {
            document.getElementById('progressContainer').classList.remove('active');
            updateProgress(0);
        }, 800);
    }
}

// ── CARREGAR DO SUPABASE STORAGE ──
async function loadFromSupabase() {
    showStatus('🔄 Carregando...', 'warn');
    try {
        const { data: files, error } = await sb.storage.from(BUCKET).list(FOLDER, {
            sortBy: { column: 'created_at', order: 'asc' }
        });
        if (error) throw new Error(error.message);

        queue = (files || []).filter(f => f.name && f.id).map(f => {
            const stPath = `${FOLDER}/${f.name}`;
            const ext  = f.name.split('.').pop().toLowerCase();
            const type = ['mp4','webm','mov','avi','mkv'].includes(ext) ? 'video'
                       : ext === 'pdf' ? 'document' : 'image';
            const name = f.name.replace(/^\d+_/, '').replace(/\.[^.]+$/, '').replace(/_/g, ' ');
            const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(stPath);
            return { id: stPath, name, type, url: pub.publicUrl, stPath, fileName: f.name, fileSize: f.metadata?.size };
        });

        saveLocal();
        renderQueue();
        updateDisplay();
        showStatus(`✅ ${queue.length} arquivo(s) carregado(s)`, 'ok');
    } catch (err) {
        showStatus('⚠️ Erro ao carregar — usando cache local', 'warn');
        await loadLocal();
    }
}

// ── DELETAR DO SUPABASE STORAGE ──
async function deleteMedia(index) {
    const item = queue[index];
    if (!confirm(`Deletar "${item.name}"?`)) return;
    try {
        const { error } = await sb.storage.from(BUCKET).remove([item.stPath]);
        if (error) throw new Error(error.message);
        queue.splice(index, 1);
        if (currentIndex >= queue.length) currentIndex = Math.max(0, queue.length - 1);
        saveLocal(); renderQueue(); updateDisplay();
        showStatus(`🗑️ "${item.name}" removido`, 'ok');
    } catch (err) { alert('Erro ao deletar: ' + err.message); }
}

// ── PERSISTÊNCIA ROBUSTA: IndexedDB + localStorage (Fire TV safe) ──
const DB_NAME    = 'StreamTV';
const DB_VERSION = 1;
const STORE_NAME = 'persist';
let   _db        = null;

function openDB() {
    return new Promise((resolve, reject) => {
        if (_db) { resolve(_db); return; }
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            e.target.result.createObjectStore(STORE_NAME);
        };
        req.onsuccess = e => { _db = e.target.result; resolve(_db); };
        req.onerror   = () => reject(req.error);
    });
}

async function idbSet(key, value) {
    try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx    = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const req   = store.put(value, key);
            req.onsuccess = () => resolve();
            req.onerror   = () => reject(req.error);
        });
    } catch(e) { /* silently fail */ }
}

async function idbGet(key) {
    try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx    = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const req   = store.get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror   = () => reject(req.error);
        });
    } catch(e) { return null; }
}

async function idbDelete(key) {
    try {
        const db = await openDB();
        return new Promise((resolve) => {
            const tx    = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.delete(key);
            tx.oncomplete = () => resolve();
        });
    } catch(e) { /* silently fail */ }
}

// Salva em IndexedDB E localStorage (redundância para Fire TV)
async function saveLocal() {
    const data = JSON.stringify(queue);
    // IndexedDB — primário (persiste mesmo com WebView reiniciado)
    await idbSet('stv_queue', data);
    // localStorage — fallback
    try { localStorage.setItem('stv_queue', data); } catch(e) {}
}

// Carrega tentando IndexedDB primeiro, depois localStorage
async function loadLocal() {
    let raw = null;
    // 1) tenta IndexedDB
    try { raw = await idbGet('stv_queue'); } catch(e) {}
    // 2) fallback para localStorage
    if (!raw) {
        try { raw = localStorage.getItem('stv_queue'); } catch(e) {}
    }
    if (raw) {
        try { queue = JSON.parse(raw); renderQueue(); updateDisplay(); } catch(e) {}
    }
}

async function clearLocal() {
    if (!confirm('Limpar fila? (arquivos continuam no GitHub)')) return;
    queue = []; currentIndex = 0;
    await idbDelete('stv_queue');
    try { localStorage.removeItem('stv_queue'); } catch(e) {}
    renderQueue(); updateDisplay();
}

// ── RENDER ──
function renderQueue() {
    const list = document.getElementById('queueList');
    document.getElementById('queueCount').textContent = queue.length;
    document.getElementById('navCounter').textContent = queue.length ? `${currentIndex+1} / ${queue.length}` : '—';
    if (!queue.length) { list.innerHTML = '<div class="empty-queue">Nenhuma mídia na fila</div>'; return; }
    list.innerHTML = queue.map((item, i) => `
        <div class="queue-item ${i===currentIndex?'active':''}" onclick="selectMedia(${i})">
            <div class="queue-item-info">
                <div class="queue-item-name">${i+1}. ${item.name}</div>
                <div class="queue-item-type">${item.type==='image'?'🖼️ Imagem':item.type==='video'?'🎬 Vídeo':'📄 Documento'}${item.fileSize?' • '+(item.fileSize/1024).toFixed(0)+' KB':''}</div>
            </div>
            <button class="btn-danger" onclick="event.stopPropagation();deleteMedia(${i})">🗑️</button>
        </div>
    `).join('');
}

function selectMedia(i) { currentIndex = i; renderQueue(); updateDisplay(); }
function navigate(dir) {
    if (!queue.length) return;
    currentIndex = (currentIndex + dir + queue.length) % queue.length;
    renderQueue(); updateDisplay();
}

// Crossfade: esconde o conteúdo atual, troca por baixo, mostra de novo — em vez
// de cortar seco pra próxima mídia. Só espera a transição quando já tem algo na
// tela (primeira exibição não precisa).
function updateDisplay() {
    const c = document.getElementById('displayContent');
    const hadContent = c.childElementCount > 0;
    if (!hadContent) { _renderDisplayContent(); return; }
    c.style.opacity = '0';
    setTimeout(() => {
        _renderDisplayContent();
        c.style.opacity = '1';
    }, 400);
}

function _renderDisplayContent() {
    const c = document.getElementById('displayContent');
    if (!queue.length) {
        c.innerHTML = '<div class="display-placeholder"><h2>📺</h2><p>Nenhuma mídia para exibir</p></div>';
        document.getElementById('hudTitle').textContent = 'StreamTV';
        document.getElementById('hudPosition').textContent = 'Nenhuma mídia';
        document.getElementById('hudStatus').textContent = 'Aguardando mídia...';
        document.getElementById('navCounter').textContent = '—';
        return;
    }
    const item = queue[currentIndex];

    // Build loop badge
    let loopBadge = '';
    if (loopMode === 'playlist') loopBadge = '<span class="loop-badge playlist">🔁 Playlist</span>';
    else if (loopMode === 'single') loopBadge = '<span class="loop-badge single">🔂 Único</span>';

    document.getElementById('hudTitle').textContent = item.name;
    document.getElementById('hudPosition').innerHTML = `${currentIndex+1} de ${queue.length}${loopBadge}`;
    document.getElementById('hudStatus').textContent = item.type==='image'?'🖼️ Imagem':item.type==='video'?'🎬 Vídeo':'📄 Documento';
    document.getElementById('navCounter').textContent = `${currentIndex+1} / ${queue.length}`;

    if (item.type === 'image') {
        c.innerHTML = `<img src="${item.url}" alt="${item.name}">`;
        // Auto-advance images after 10s if autoplay is on
        if (autoplay && (loopMode === 'playlist' || loopMode === 'single')) {
            clearTimeout(window._imgTimer);
            window._imgTimer = setTimeout(() => {
                if (loopMode === 'single') {
                    updateDisplay(); // re-trigger same
                } else {
                    navigate(1);
                }
            }, 10000);
        }
    } else if (item.type === 'video') {
        const loopAttr = loopMode === 'single' ? 'loop' : '';
        c.innerHTML = `<video id="mainVideo" autoplay ${loopAttr} style="max-width:100%;max-height:100%;"><source src="${item.url}">Vídeo não suportado</video>`;
        const vid = document.getElementById('mainVideo');
        if (vid && loopMode !== 'single' && autoplay) {
            vid.addEventListener('ended', () => {
                if (loopMode === 'playlist') navigate(1);
                // loopMode 'off' = just stops
            });
        }
    } else {
        c.innerHTML = `<iframe src="${item.url}"></iframe>`;
    }
}

// ── TECLADO + FULLSCREEN ──
document.addEventListener('keydown', e => {
    if (['ArrowRight',' '].includes(e.key)) { e.preventDefault(); navigate(1); }
    else if (e.key === 'ArrowLeft')         { e.preventDefault(); navigate(-1); }
    else if (e.key==='f'||e.key==='F')      { e.preventDefault(); toggleFullscreen(); }
});
function toggleFullscreen() {
    const el = document.getElementById('displayArea');
    if (!document.fullscreenElement) el.requestFullscreen().catch(e=>alert(e.message));
    else document.exitFullscreen();
}

// ── AUTO-ESCONDER HUD/NAV EM FULLSCREEN ──
// Some (opacity 0) depois de 3s parado, só quando em fullscreen; qualquer
// movimento do mouse mostra de novo e reinicia a contagem. Fora do fullscreen
// os controles ficam sempre visíveis (não faz sentido escondê-los ali).
let _fsIdleTimer = null;
function _fsShowControls() {
    const area = document.getElementById('displayArea');
    area.classList.remove('fs-idle');
    clearTimeout(_fsIdleTimer);
    if (document.fullscreenElement === area) {
        _fsIdleTimer = setTimeout(() => area.classList.add('fs-idle'), 3000);
    }
}
document.addEventListener('fullscreenchange', () => {
    const area = document.getElementById('displayArea');
    if (document.fullscreenElement === area) _fsShowControls();
    else { area.classList.remove('fs-idle'); clearTimeout(_fsIdleTimer); }
});
document.getElementById('displayArea').addEventListener('mousemove', _fsShowControls);

// ── INIT ──
setLoopMode('playlist'); // default: loop playlist
loadFromSupabase();
</script>
